<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI 开发助手 · ElainaBot</title>
<style>
:root{
  --bg:#f4f6fb; --bg2:#eef1f9; --card:#ffffff; --ink:#1f2440; --ink2:#5b6280;
  --muted:#9aa1bd; --line:#e7eaf3; --line2:#eef0f7;
  --brand:#6366f1; --brand2:#8b5cf6; --brand-soft:#eef0ff;
  --green:#10b981; --green-soft:#e7f8f1; --red:#ef4444; --red-soft:#fdecec;
  --amber:#f59e0b; --amber-soft:#fef4e2; --blue:#3b82f6; --blue-soft:#e8f1fe;
  --radius:16px; --shadow:0 6px 24px rgba(60,72,140,.08); --shadow-lg:0 18px 50px rgba(60,72,140,.16);
  --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);color:var(--ink);background:
  radial-gradient(1200px 600px at 0% -10%,#eef1ff 0%,transparent 55%),
  radial-gradient(1100px 600px at 100% 0%,#f3eaff 0%,transparent 50%),
  var(--bg);
  -webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#d3d8ec;border-radius:9px}
::-webkit-scrollbar-thumb:hover{background:#c2c8e3}
::-webkit-scrollbar-track{background:transparent}

/* ===== Login ===== */
#login{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(900px 500px at 30% 10%,#e9ecff,transparent),linear-gradient(135deg,#f6f7fc,#eef0fb)}
.login-card{width:380px;max-width:92vw;background:var(--card);border-radius:24px;padding:38px 34px;
  box-shadow:var(--shadow-lg);border:1px solid var(--line);animation:pop .5s cubic-bezier(.2,.8,.2,1)}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
.login-logo{width:62px;height:62px;border-radius:18px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-size:30px;margin-bottom:18px;
  box-shadow:0 10px 22px rgba(99,102,241,.4)}
.login-card h1{font-size:21px;margin-bottom:6px}
.login-card p{color:var(--ink2);font-size:13px;margin-bottom:22px}
.field{position:relative;margin-bottom:14px}
.field input{width:100%;height:48px;border:1.5px solid var(--line);border-radius:13px;padding:0 16px;
  font-size:15px;background:#fbfcff;transition:.2s;color:var(--ink)}
.field input:focus{outline:none;border-color:var(--brand);background:#fff;box-shadow:0 0 0 4px var(--brand-soft)}
.btn-primary{width:100%;height:48px;border-radius:13px;background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;font-size:15px;font-weight:600;transition:.2s;box-shadow:0 8px 20px rgba(99,102,241,.35)}
.btn-primary:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn-primary:active{transform:none}
.login-err{color:var(--red);font-size:13px;margin-top:12px;min-height:18px;text-align:center}

/* ===== App layout ===== */
#app{display:none;height:100vh;flex-direction:column}
.topbar{height:62px;flex:0 0 62px;display:flex;align-items:center;gap:14px;padding:0 20px;
  background:rgba(255,255,255,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);z-index:10}
.brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:16px}
.brand .mark{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-size:18px;box-shadow:0 6px 14px rgba(99,102,241,.35)}
.brand small{display:block;font-weight:500;font-size:11px;color:var(--muted)}
.topbar .spacer{flex:1}
.model-pick{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);
  border-radius:11px;padding:7px 12px;font-size:13px;color:var(--ink2)}
.model-pick select{border:none;background:none;font-size:13px;font-weight:600;color:var(--ink);max-width:180px}
.model-pick select:focus{outline:none}
.status{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink2);
  background:#fff;border:1px solid var(--line);border-radius:11px;padding:7px 12px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--muted);transition:.3s}
.dot.on{background:var(--green);box-shadow:0 0 0 4px var(--green-soft)}
.dot.off{background:var(--red);box-shadow:0 0 0 4px var(--red-soft)}
.icon-btn{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  color:var(--ink2);border:1px solid var(--line);background:#fff;transition:.2s}
.icon-btn:hover{color:var(--brand);border-color:var(--brand);background:var(--brand-soft)}

.main{flex:1;display:flex;min-height:0;gap:14px;padding:14px 16px}

/* sidebar */
.sidebar{width:248px;flex:0 0 248px;display:flex;flex-direction:column;gap:12px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.new-chat{height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-weight:600;font-size:14px;
  box-shadow:0 8px 18px rgba(99,102,241,.32);transition:.2s}
.new-chat:hover{transform:translateY(-1px);filter:brightness(1.04)}
.sessions{flex:1;overflow-y:auto;padding:8px}
.sess-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 8px 6px}
.sess{display:flex;align-items:center;gap:9px;padding:10px 10px;border-radius:11px;cursor:pointer;transition:.15s;margin-bottom:2px}
.sess:hover{background:var(--bg2)}
.sess.active{background:var(--brand-soft)}
.sess .si{width:30px;height:30px;border-radius:9px;background:#eef1fb;display:flex;align-items:center;justify-content:center;
  font-size:14px;flex:0 0 30px}
.sess.active .si{background:#fff;color:var(--brand)}
.sess .meta{flex:1;min-width:0}
.sess .meta b{font-size:13px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sess .meta span{font-size:11px;color:var(--muted)}
.sess .del{opacity:0;color:var(--muted);font-size:15px;transition:.15s;padding:2px 5px;border-radius:6px}
.sess:hover .del{opacity:1}
.sess .del:hover{color:var(--red);background:var(--red-soft)}

.sys-card{padding:14px}
.sys-card h4{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.sys-row{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;color:var(--ink2)}
.sys-row b{color:var(--ink);font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* chat */
.chat{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.chat-head{padding:15px 20px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:10px}
.chat-head h3{font-size:15px}
.chat-head .tag{font-size:11px;color:var(--brand);background:var(--brand-soft);padding:3px 9px;border-radius:20px;font-weight:600}
.chat-head .spacer{flex:1}
.chat-head .mini{font-size:12px;color:var(--muted)}
.messages{flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:18px}
.welcome{margin:auto;text-align:center;max-width:440px;color:var(--ink2)}
.welcome .wbadge{width:64px;height:64px;border-radius:20px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-size:30px;box-shadow:var(--shadow-lg)}
.welcome h2{color:var(--ink);font-size:20px;margin-bottom:8px}
.welcome p{font-size:14px;line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px}
.chip{font-size:12.5px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:8px 14px;
  color:var(--ink2);transition:.15s;cursor:pointer}
.chip:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}

.msg{display:flex;gap:12px;max-width:100%;animation:fade .3s}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg .av{width:36px;height:36px;border-radius:11px;flex:0 0 36px;display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:600}
.msg.user{flex-direction:row-reverse}
.msg.user .av{background:linear-gradient(135deg,#0ea5e9,#3b82f6);color:#fff}
.msg.ai .av{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
.bubble{padding:13px 16px;border-radius:15px;font-size:14.5px;line-height:1.7;max-width:78%;word-break:break-word}
.msg.user .bubble{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;border-bottom-right-radius:5px}
.msg.ai .bubble{background:#fff;border:1px solid var(--line);border-bottom-left-radius:5px;box-shadow:var(--shadow)}
.bubble pre{background:#0f1426;color:#e6e9f5;border-radius:11px;padding:13px 15px;margin:9px 0;overflow-x:auto;
  font-family:var(--mono);font-size:12.5px;line-height:1.55}
.bubble code{font-family:var(--mono);font-size:12.5px;background:var(--bg2);padding:2px 6px;border-radius:6px}
.bubble pre code{background:none;padding:0;color:inherit}
.msg.user .bubble code{background:rgba(255,255,255,.2);color:#fff}
.typing{display:flex;gap:5px;padding:4px 0}
.typing i{width:8px;height:8px;border-radius:50%;background:var(--brand);opacity:.5;animation:bounce 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

.composer{padding:14px 18px;border-top:1px solid var(--line2)}
.composer .box{display:flex;gap:10px;align-items:flex-end;background:#fbfcff;border:1.5px solid var(--line);
  border-radius:16px;padding:10px 10px 10px 16px;transition:.2s}
.composer .box:focus-within{border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-soft);background:#fff}
.composer textarea{flex:1;border:none;background:none;resize:none;font-size:14.5px;line-height:1.6;max-height:160px;color:var(--ink)}
.composer textarea:focus{outline:none}
.send{width:42px;height:42px;border-radius:12px;flex:0 0 42px;background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.2s;box-shadow:0 6px 14px rgba(99,102,241,.35)}
.send:hover{transform:translateY(-1px)}
.send:disabled{opacity:.5;cursor:not-allowed;transform:none}
.composer .hint{font-size:11px;color:var(--muted);margin-top:7px;padding-left:4px}

/* activity */
.activity{width:380px;flex:0 0 380px;display:flex;flex-direction:column;overflow:hidden}
.act-head{padding:15px 18px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:10px}
.act-head h3{font-size:14px}
.act-head .spacer{flex:1}
.tabs{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:3px}
.tab{font-size:12px;padding:6px 13px;border-radius:8px;color:var(--ink2);font-weight:600;transition:.15s}
.tab.active{background:#fff;color:var(--brand);box-shadow:0 2px 6px rgba(60,72,140,.1)}
.act-clear{font-size:12px;color:var(--muted)}
.act-clear:hover{color:var(--red)}
.act-list{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px}
.act-empty{margin:auto;text-align:center;color:var(--muted);font-size:13px;padding:40px 20px}
.ev{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#fff;animation:fade .25s}
.ev-top{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer}
.ev-ic{width:28px;height:28px;border-radius:8px;flex:0 0 28px;display:flex;align-items:center;justify-content:center;font-size:14px}
.ev-name{flex:1;min-width:0}
.ev-name b{font-size:13px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-name span{font-size:11px;color:var(--muted)}
.ev-badge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.ev-body{border-top:1px dashed var(--line);padding:10px 12px;display:none;background:#fbfcff}
.ev.open .ev-body{display:block}
.ev-body .lbl{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:2px 0 5px}
.ev-body pre{background:#0f1426;color:#e6e9f5;border-radius:9px;padding:10px 12px;overflow-x:auto;
  font-family:var(--mono);font-size:11.5px;line-height:1.5;max-height:280px;margin-bottom:8px;white-space:pre-wrap;word-break:break-word}
.chev{color:var(--muted);font-size:12px;transition:.2s}
.ev.open .chev{transform:rotate(90deg)}

.b-tool{background:var(--blue-soft);color:var(--blue)}
.b-ok{background:var(--green-soft);color:var(--green)}
.b-err{background:var(--red-soft);color:var(--red)}
.b-user{background:#e8f1fe;color:#2563eb}
.b-ai{background:var(--brand-soft);color:var(--brand)}
.i-tool{background:var(--blue-soft);color:var(--blue)}
.i-ok{background:var(--green-soft);color:var(--green)}
.i-err{background:var(--red-soft);color:var(--red)}
.i-user{background:#e8f1fe;color:#2563eb}
.i-ai{background:var(--brand-soft);color:var(--brand)}
.i-info{background:var(--amber-soft);color:var(--amber)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:12px;font-size:13.5px;z-index:60;
  transition:.3s;box-shadow:var(--shadow-lg);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:1180px){.activity{width:320px;flex-basis:320px}}
@media(max-width:1020px){.activity{display:none}.sidebar{width:210px;flex-basis:210px}}
@media(max-width:760px){.sidebar{display:none}.main{padding:8px}}
</style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">✦</div>
    <h1>AI 开发助手</h1>
    <p>使用框架管理员密码登录，开始让 AI 编写与管理插件。</p>
    <form id="loginForm">
      <div class="field"><input id="pwd" type="password" placeholder="管理员密码" autocomplete="current-password"></div>
      <button class="btn-primary" type="submit" id="loginBtn">登录</button>
    </form>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="mark">✦</div>
      <div>ElainaBot<small>AI 开发助手面板</small></div>
    </div>
    <div class="spacer"></div>
    <div class="model-pick" title="选择模型">
      <span>🧠</span>
      <select id="modelSel"></select>
    </div>
    <div class="status"><span class="dot" id="connDot"></span><span id="connTxt">连接中…</span></div>
    <button class="icon-btn" id="logoutBtn" title="退出登录">⎋</button>
  </div>

  <div class="main">
    <!-- sidebar -->
    <div class="sidebar">
      <button class="new-chat" id="newChat">＋ 新建对话</button>
      <div class="panel" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <div class="sess-title">对话</div>
        <div class="sessions" id="sessions"></div>
      </div>
      <div class="panel sys-card">
        <h4>系统状态</h4>
        <div id="sysInfo">
          <div class="sys-row"><span>加载中…</span></div>
        </div>
      </div>
    </div>

    <!-- chat -->
    <div class="panel chat">
      <div class="chat-head">
        <h3 id="chatTitle">新对话</h3>
        <span class="tag" id="chatModel">—</span>
        <div class="spacer"></div>
        <span class="mini" id="chatMeta"></span>
      </div>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <div class="box">
          <textarea id="input" rows="1" placeholder="对 AI 说点什么… 例如：写一个 ID 命令插件，返回我的 QQ 号"></textarea>
          <button class="send" id="sendBtn" title="发送">➤</button>
        </div>
        <div class="hint">Enter 发送 · Shift+Enter 换行 · AI 可读写文件、热重载插件、运行测试、管理配置</div>
      </div>
    </div>

    <!-- activity -->
    <div class="panel activity">
      <div class="act-head">
        <h3>实时调用 / 日志</h3>
        <div class="spacer"></div>
        <div class="tabs">
          <button class="tab active" data-f="all">全部</button>
          <button class="tab" data-f="tool">调用</button>
          <button class="tab" data-f="msg">对话</button>
        </div>
        <button class="act-clear" id="actClear" title="清空显示">清空</button>
      </div>
      <div class="act-list" id="actList">
        <div class="act-empty">暂无活动，发送消息后这里会实时显示 AI 的每一次工具调用与结果。</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
let TOKEN=localStorage.getItem('ai_dev_token')||'';
let SID=localStorage.getItem('ai_dev_sid')||'';
let MODEL=localStorage.getItem('ai_dev_model')||'';
let FILTER='all', evbuf=[], sending=false, es=null;

function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2600);}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function api(path,opts={}){
  opts.headers=Object.assign({'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},opts.headers||{});
  return fetch(path,opts);
}
function fmtTime(t){const d=new Date(t*1000);return d.toLocaleTimeString('zh-CN',{hour12:false});}

/* ---- markdown-lite ---- */
function render(md){
  md=md||'';
  const parts=md.split(/```/);
  let out='';
  for(let i=0;i<parts.length;i++){
    if(i%2===1){
      let code=parts[i].replace(/^[\w-]*\n/,'');
      out+='<pre><code>'+esc(code)+'</code></pre>';
    }else{
      let t=esc(parts[i]);
      t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
      t=t.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
      t=t.replace(/\n/g,'<br>');
      out+=t;
    }
  }
  return out;
}

/* ---- login ---- */
$('#loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const pwd=$('#pwd').value, btn=$('#loginBtn');
  btn.disabled=true;btn.textContent='登录中…';$('#loginErr').textContent='';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
    const d=await r.json();
    if(d.success){TOKEN=d.token;localStorage.setItem('ai_dev_token',TOKEN);start();}
    else{$('#loginErr').textContent=d.error||'登录失败';}
  }catch(err){$('#loginErr').textContent='网络错误';}
  btn.disabled=false;btn.textContent='登录';
});
$('#logoutBtn').addEventListener('click',()=>{localStorage.removeItem('ai_dev_token');location.reload();});

/* ---- boot ---- */
async function start(){
  const r=await api('/ai/api/config');
  if(r.status===401){showLogin();return;}
  $('#login').style.display='none';$('#app').style.display='flex';
  const cfg=(await r.json()).config||{};
  if(!MODEL)MODEL=cfg.model||'';
  await loadModels();
  await loadSessions(true);
  loadSystem();setInterval(loadSystem,8000);
  await loadCalls();
  connectSSE();
  if(!cfg.api_key_set)toast('提示：尚未配置 api_key，请在 settings.yaml 设置 ai.api_key');
}
function showLogin(){$('#login').style.display='flex';$('#app').style.display='none';}

async function loadModels(){
  try{
    const d=await (await api('/ai/api/models')).json();
    const sel=$('#modelSel');sel.innerHTML='';
    const list=(d.models&&d.models.length)?d.models:[MODEL||'gpt-4.1-nano'];
    list.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o);});
    if(MODEL&&list.includes(MODEL))sel.value=MODEL;else MODEL=sel.value;
    $('#chatModel').textContent=MODEL;
  }catch(e){}
}
$('#modelSel').addEventListener('change',e=>{MODEL=e.target.value;localStorage.setItem('ai_dev_model',MODEL);$('#chatModel').textContent=MODEL;});

/* ---- sessions ---- */
async function loadSessions(pick){
  const d=await (await api('/ai/api/sessions')).json();
  const box=$('#sessions');box.innerHTML='';
  const list=(d.sessions||[]).filter(s=>!s.id.startsWith('qq_'));
  if(pick&&!SID&&list.length)SID=list[0].id;
  if(!list.length){box.innerHTML='<div class="act-empty" style="font-size:12px">点击上方「新建对话」开始</div>';}
  list.forEach(s=>{
    const el=document.createElement('div');el.className='sess'+(s.id===SID?' active':'');
    el.innerHTML=`<div class="si">💬</div><div class="meta"><b>${esc(s.title||'新对话')}</b><span>${s.message_count} 条消息</span></div><button class="del" title="删除">🗑</button>`;
    el.addEventListener('click',()=>selectSession(s.id));
    el.querySelector('.del').addEventListener('click',ev=>{ev.stopPropagation();delSession(s.id);});
    box.appendChild(el);
  });
  if(SID)loadHistory();else renderWelcome();
}
async function selectSession(id){SID=id;localStorage.setItem('ai_dev_sid',id);loadSessions();}
async function delSession(id){
  await api('/ai/api/sessions/delete',{method:'POST',body:JSON.stringify({session_id:id})});
  if(id===SID){SID='';localStorage.removeItem('ai_dev_sid');}
  loadSessions(true);
}
$('#newChat').addEventListener('click',async()=>{
  const d=await (await api('/ai/api/sessions',{method:'POST',body:'{}'})).json();
  if(d.success){SID=d.session.id;localStorage.setItem('ai_dev_sid',SID);loadSessions();$('#input').focus();}
});

async function loadHistory(){
  const d=await (await api('/ai/api/history?session_id='+SID)).json();
  const box=$('#messages');box.innerHTML='';
  const msgs=d.messages||[];
  if(!msgs.length){renderWelcome();return;}
  msgs.forEach(m=>addMsg(m.role==='user'?'user':'ai',m.content,false));
  scrollChat();
  const cur=(await (await api('/ai/api/sessions')).json()).sessions.find(s=>s.id===SID);
  $('#chatTitle').textContent=cur?cur.title:'对话';
}
function renderWelcome(){
  $('#chatTitle').textContent='新对话';
  $('#messages').innerHTML=`<div class="welcome">
    <div class="wbadge">✦</div>
    <h2>你好，我是 AI 开发助手</h2>
    <p>我能直接为这个 OneBot 框架编写、修改、热重载插件，运行测试，检查系统与管理配置。把需求告诉我吧。</p>
    <div class="chips">
      <div class="chip">写一个「天气」命令插件</div>
      <div class="chip">列出当前所有插件</div>
      <div class="chip">检查系统与框架状态</div>
      <div class="chip">把框架名称改成 MyBot</div>
    </div></div>`;
  $$('.chip').forEach(c=>c.addEventListener('click',()=>{$('#input').value=c.textContent;$('#input').focus();autoGrow();}));
}

/* ---- messages ---- */
function addMsg(role,content,anim){
  const w=$('#welcome'); const box=$('#messages');
  if(box.querySelector('.welcome'))box.innerHTML='';
  const el=document.createElement('div');el.className='msg '+role;if(!anim)el.style.animation='none';
  el.innerHTML=`<div class="av">${role==='user'?'我':'AI'}</div><div class="bubble">${role==='ai'?render(content):esc(content).replace(/\n/g,'<br>')}</div>`;
  box.appendChild(el);scrollChat();return el;
}
function addTyping(){
  const box=$('#messages');const el=document.createElement('div');el.className='msg ai';el.id='typing';
  el.innerHTML=`<div class="av">AI</div><div class="bubble"><div class="typing"><i></i><i></i><i></i></div></div>`;
  box.appendChild(el);scrollChat();return el;
}
function scrollChat(){const m=$('#messages');m.scrollTop=m.scrollHeight;}

const inp=$('#input');
function autoGrow(){inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,160)+'px';}
inp.addEventListener('input',autoGrow);
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
$('#sendBtn').addEventListener('click',send);

async function send(){
  const text=inp.value.trim();if(!text||sending)return;
  if(!SID){const d=await (await api('/ai/api/sessions',{method:'POST',body:'{}'})).json();SID=d.session.id;localStorage.setItem('ai_dev_sid',SID);}
  sending=true;$('#sendBtn').disabled=true;
  addMsg('user',text,true);inp.value='';autoGrow();
  const typing=addTyping();
  $('#chatMeta').textContent='AI 思考中…';
  try{
    const r=await api('/ai/api/chat',{method:'POST',body:JSON.stringify({session_id:SID,message:text,model:MODEL})});
    const d=await r.json();
    typing.remove();
    if(d.success){addMsg('ai',d.message||'(无内容)',true);$('#chatMeta').textContent='完成 · '+(d.iterations||1)+' 步';}
    else{addMsg('ai','⚠️ '+(d.message||d.error||'调用失败'),true);$('#chatMeta').textContent='出错';}
    loadSessions();
  }catch(e){typing.remove();addMsg('ai','⚠️ 网络错误: '+e,true);$('#chatMeta').textContent='出错';}
  sending=false;$('#sendBtn').disabled=false;inp.focus();
}

/* ---- activity feed ---- */
const EV={
  user:{ic:'👤',icc:'i-user',bc:'b-user',label:'用户消息'},
  assistant:{ic:'🤖',icc:'i-ai',bc:'b-ai',label:'AI 回复'},
  tool_call:{ic:'🔧',icc:'i-tool',bc:'b-tool',label:'工具调用'},
  tool_result:{ic:'📦',icc:'i-ok',bc:'b-ok',label:'工具结果'},
  error:{ic:'⚠️',icc:'i-err',bc:'b-err',label:'错误'},
  info:{ic:'ℹ️',icc:'i-info',bc:'b-tool',label:'信息'},
};
function evMatch(t){if(FILTER==='all')return true;if(FILTER==='tool')return t==='tool_call'||t==='tool_result';if(FILTER==='msg')return t==='user'||t==='assistant'||t==='error';return true;}
function renderEvents(){
  const list=$('#actList');const items=evbuf.filter(e=>evMatch(e.type));
  if(!items.length){list.innerHTML='<div class="act-empty">暂无活动，发送消息后这里会实时显示 AI 的每一次工具调用与结果。</div>';return;}
  list.innerHTML='';
  items.slice(-200).forEach(e=>list.appendChild(evEl(e)));
  list.scrollTop=list.scrollHeight;
}
function evEl(e){
  const meta=EV[e.type]||EV.info;const d=e.data||{};
  let title=meta.label,sub=fmtTime(e.time),badge='',body='';
  if(e.type==='tool_call'){title=d.name||'工具';sub='参数 · '+fmtTime(e.time);badge=`<span class="ev-badge b-tool">调用</span>`;
    body=`<div class="lbl">arguments</div><pre>${esc(JSON.stringify(d.arguments||{},null,2))}</pre>`;}
  else if(e.type==='tool_result'){title=d.name||'工具';sub=(d.ok?'成功':'失败')+' · '+(d.duration_ms||0)+'ms';
    badge=`<span class="ev-badge ${d.ok?'b-ok':'b-err'}">${d.ok?'结果 ✓':'结果 ✗'}</span>`;
    body=`<div class="lbl">result</div><pre>${esc(JSON.stringify(d.result||{},null,2))}</pre>`;
    meta.icc=d.ok?'i-ok':'i-err';meta.ic=d.ok?'📦':'❌';}
  else if(e.type==='user'){title='用户消息';badge=`<span class="ev-badge b-user">输入</span>`;body=`<pre>${esc(d.content||'')}</pre>`;}
  else if(e.type==='assistant'){title='AI 回复';const u=d.usage||{};sub=(u.total_tokens?u.total_tokens+' tokens · ':'')+fmtTime(e.time);
    badge=`<span class="ev-badge b-ai">回复</span>`;body=`<pre>${esc(d.content||'')}</pre>`;}
  else if(e.type==='error'){title='错误';badge=`<span class="ev-badge b-err">error</span>`;body=`<pre>${esc(d.message||JSON.stringify(d))}</pre>`;}
  const el=document.createElement('div');el.className='ev';
  el.innerHTML=`<div class="ev-top"><div class="ev-ic ${meta.icc}">${meta.ic}</div>
    <div class="ev-name"><b>${esc(title)}</b><span>${esc(sub)}</span></div>${badge}
    <span class="chev">▶</span></div><div class="ev-body">${body}</div>`;
  el.querySelector('.ev-top').addEventListener('click',()=>el.classList.toggle('open'));
  return el;
}
function pushEvent(e){evbuf.push(e);if(evbuf.length>500)evbuf=evbuf.slice(-500);
  if(evMatch(e.type)){const list=$('#actList');if(list.querySelector('.act-empty'))list.innerHTML='';
    list.appendChild(evEl(e));list.scrollTop=list.scrollHeight;}}
async function loadCalls(){
  try{const d=await (await api('/ai/api/calls?limit=200')).json();evbuf=d.events||[];renderEvents();}catch(e){}
}
$$('.tab').forEach(t=>t.addEventListener('click',()=>{$$('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');FILTER=t.dataset.f;renderEvents();}));
$('#actClear').addEventListener('click',()=>{evbuf=[];renderEvents();});

/* ---- system ---- */
async function loadSystem(){
  try{
    const d=await (await api('/ai/api/calls?limit=1')).json(); // keepalive cheap; real sys via tool not needed
  }catch(e){}
  // pull live system info via dedicated lightweight call
  fetchSys();
}
async function fetchSys(){
  try{
    const r=await api('/api/system/info');
    if(!r.ok)return;
    const d=await r.json();const s=d.data||d;const box=$('#sysInfo');
    const cpu=s.cpu_percent!=null?s.cpu_percent+'%':'—';
    const mem=(s.memory&&s.memory.percent!=null)?s.memory.percent+'%':'—';
    box.innerHTML=`
      <div class="sys-row"><span>CPU</span><b>${cpu}</b></div>
      <div class="sys-row"><span>内存</span><b>${mem}</b></div>
      <div class="sys-row"><span>插件</span><b>${(s.plugins!=null?s.plugins:(s.plugin_count!=null?s.plugin_count:'—'))}</b></div>
      <div class="sys-row"><span>系统</span><b>${esc(s.system||s.os||navigator.platform)}</b></div>`;
  }catch(e){}
}

/* ---- SSE ---- */
function connectSSE(){
  if(es)es.close();
  es=new EventSource('/ai/api/stream?token='+encodeURIComponent(TOKEN));
  es.onopen=()=>{$('#connDot').className='dot on';$('#connTxt').textContent='已连接';};
  es.onerror=()=>{$('#connDot').className='dot off';$('#connTxt').textContent='重连中…';};
  es.onmessage=ev=>{
    try{const e=JSON.parse(ev.data);if(!e.type||e.type==='init')return;pushEvent(e);}catch(err){}
  };
}

/* ---- init ---- */
if(TOKEN)start();else showLogin();
