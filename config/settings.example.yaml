# ===== 框架全局设置 =====
# 修改后自动热加载，无需重启

# HTTP 服务器
server:
  host: "0.0.0.0"
  port: 5201

# Web 面板
web:
  access_token: "admin"                    # URL 参数验证令牌
  admin_password: "admin"                  # 管理员密码
  framework_name: "Elaina"                 # 框架名称
  favicon_url: ""                          # 网页图标 URL

# OneBot 协议
onebot:
  access_token: ""                         # 默认鉴权 token（连接未单独配置时使用）
  secret: ""                               # 默认 HTTP 上报签名密钥（可选）
  # 网络连接（可在「网络配置」页面可视化管理，支持多条）
  # type: ws_reverse(反向WS) / ws_forward(正向WS) / http_server(HTTP上报) / http_client(HTTP调用)
  connections:
    - type: ws_reverse                     # 反向 WS：框架监听, OneBot 端连入（复用 server 端口）
      name: "反向 WS"
      enable: true
      host: "0.0.0.0"
      port: 5201
      path: "/OneBotv11"
      token: ""
    - type: ws_forward                     # 正向 WS：框架主动连接 OneBot 端 WS 服务器
      name: "正向 WS"
      enable: false
      url: "ws://127.0.0.1:3001"
      token: ""
      reconnect_interval: 5000             # 重连间隔(毫秒)
    - type: http_server                    # HTTP 上报：框架接收 OneBot 事件上报
      name: "HTTP 上报"
      enable: false
      host: "0.0.0.0"
      port: 5201
      path: "/"
      secret: ""
    - type: http_client                    # HTTP 调用：框架通过 HTTP 调用 OneBot API
      name: "HTTP API"
      enable: false
      url: "http://127.0.0.1:3000"
      token: ""

# 主人配置
owner:
  ids:                                     # 主人 QQ 号列表
    - ""

# 日志配置
logging:
  dir: "log"                               # 日志根目录
  insert_interval: 2                       # 批量写入间隔(秒)
  retention_days: 30                       # 日志保留天数
  wal_mode: true                           # SQLite WAL模式

# 依赖管理
pip:
  auto_install: true                       # 自动安装模块/插件依赖
  mirror: ""                               # pip 镜像源
