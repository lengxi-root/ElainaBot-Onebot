# ===== 框架全局设置 =====
# 修改后自动热加载，无需重启

# HTTP 服务器
server:
  host: "0.0.0.0"
  port: 5201

# Web 面板
web:
  access_token: "admin"                    # URL 参数验证令牌
  admin_password: "admin"                  # 管理员密码
  framework_name: "Elaina"                 # 框架名称
  favicon_url: ""                          # 网页图标 URL

# 主人配置
owner:
  ids:                                     # 主人 QQ 号列表
    - ""

# 日志配置
logging:
  dir: "log"                               # 日志根目录
  insert_interval: 2                       # 批量写入间隔(秒)
  retention_days: 30                       # 日志保留天数
  wal_mode: true                           # SQLite WAL模式

# 依赖管理
pip:
  auto_install: true                       # 自动安装模块/插件依赖
  mirror: ""                               # pip 镜像源

# AI 开发助手插件 (plugins/ai_dev)
# 接入 OpenAI 兼容接口, 让 AI 自主编写/修改框架插件并提供 Web 面板 (/ai/)
ai:
  enabled: true
  base_url: "https://api.openai.com/v1"    # OpenAI 兼容接口地址 (NewAPI 中转填中转站 /v1)
  api_key: ""                              # 密钥; 留空则读取环境变量 AI_DEV_API_KEY / OPENAI_API_KEY
  model: "gpt-4.1-nano"                    # 默认模型
  temperature: 0.3
  max_iterations: 12                       # 单轮对话最大工具调用迭代步数
  request_timeout: 120                     # 单次请求超时(秒)
  system_prompt: ""                        # 可选: 覆盖默认系统提示词
